<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Feeds - Torrent Manager</title>
    <script src="/static/tailwind.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="md:flex md:items-center md:justify-between mb-8">
            <div>
                <h2 class="text-2xl font-bold text-slate-900 sm:text-3xl">RSS Automation</h2>
                <p class="mt-1 text-sm text-slate-500">Add feeds, assign a target server, and monitor delayed torrent ingestion.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 space-y-6">
                <div id="rssFeedsList" class="space-y-4">
                    <div class="text-center py-12">
                        <i class="fas fa-circle-notch fa-spin text-indigo-500 text-3xl"></i>
                    </div>
                </div>

                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="px-5 py-4 border-b border-slate-200 flex items-center justify-between">
                        <div>
                            <h3 class="text-lg font-semibold text-slate-900">Recent RSS Items</h3>
                            <p class="text-sm text-slate-500">Latest detected and added torrents across all feeds.</p>
                        </div>
                        <button onclick="loadRssItems()" class="px-3 py-1.5 text-xs font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">
                            <i class="fas fa-rotate mr-1.5"></i>Refresh
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-slate-200">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Item</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider hidden md:table-cell">Detected</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider hidden lg:table-cell">Next Add</th>
                                </tr>
                            </thead>
                            <tbody id="rssItemsTable" class="divide-y divide-slate-100 bg-white"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="xl:col-span-1">
                <div class="bg-white shadow rounded-xl border border-slate-200 sticky top-6">
                    <div class="p-5 border-b border-slate-200">
                        <h3 id="rssFormTitle" class="text-lg font-semibold text-slate-900">Add RSS Feed</h3>
                    </div>
                    <form id="rssForm" class="p-5 space-y-4">
                        <input type="hidden" id="editingFeedId">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
                            <input type="text" name="name" required class="block w-full rounded-lg border-slate-300 focus:border-indigo-500 focus:ring-indigo-500 text-sm h-10 px-3 border" placeholder="TV Releases">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Feed URL</label>
                            <input type="url" name="url" required class="block w-full rounded-lg border-slate-300 focus:border-indigo-500 focus:ring-indigo-500 text-sm h-10 px-3 border" placeholder="https://example.com/rss.xml">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Target Server</label>
                            <select name="server_id" required class="block w-full rounded-lg border-slate-300 focus:border-indigo-500 focus:ring-indigo-500 text-sm h-10 px-3 border bg-white">
                                <option value="">Loading servers...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Delay Before Add</label>
                            <div class="relative">
                                <input type="number" min="0" name="delay_hours" value="0" required class="block w-full rounded-lg border-slate-300 focus:border-indigo-500 focus:ring-indigo-500 text-sm h-10 px-3 border" placeholder="0">
                                <span class="absolute inset-y-0 right-3 flex items-center text-sm text-slate-400">hours</span>
                            </div>
                            <p class="mt-1 text-xs text-slate-400">New items wait this long after detection before they are added.</p>
                        </div>
                        <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-lg">
                            <input type="checkbox" name="enabled" checked class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 rounded">
                            <span>
                                <span class="block text-sm font-medium text-slate-700">Feed enabled</span>
                                <span class="block text-xs text-slate-400">Disabled feeds keep history but are not polled.</span>
                            </span>
                        </label>
                        <div class="flex gap-2 pt-2">
                            <button type="submit" class="flex-1 inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-sm font-medium text-white hover:bg-indigo-700">
                                <span id="rssSubmitBtnText">Save Feed</span>
                            </button>
                            <button type="button" onclick="resetRssForm()" class="px-4 py-2 rounded-lg border border-slate-300 text-sm font-medium text-slate-700 hover:bg-slate-50">
                                Reset
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/config.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/rss.js"></script>
</body>
</html>
